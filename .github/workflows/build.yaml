name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # needed to manage the image-ready label

env:
  REGISTRY: simployertechdev.azurecr.io
  IMAGE_NAME: demo-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Remove image-ready label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s -o /dev/null -X DELETE -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/image-ready" || true

      - name: Compute tags
        id: tags
        run: |
          FULL_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          SHORT_SHA="${FULL_SHA::7}"
          R="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            { echo "tags<<EOF"; echo "${R}:sha-${SHORT_SHA}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            { echo "tags<<EOF"; echo "${R}:${GITHUB_REF#refs/tags/v}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          else
            { echo "tags<<EOF"; echo "${R}:latest"; echo "${R}:main-${SHORT_SHA}"; echo "${R}:sha-${SHORT_SHA}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Set image-ready label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s -o /dev/null -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" -d '{"labels":["image-ready"]}'
